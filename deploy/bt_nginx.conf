# ===================================================
# 柬埔寨批发管理系统 - 宝塔面板 Nginx 配置
# 使用方式:
#   方法1: 运行 bt_setup.sh 自动写入
#   方法2: 宝塔面板 → 网站 → 添加站点 → 配置文件 → 粘贴此内容
# ===================================================

server {
    listen 80;
    server_name _;  # 替换为你的域名或服务器IP

    # ---------- 日志(宝塔标准路径) ----------
    access_log /www/wwwlogs/wholesale.log;
    error_log  /www/wwwlogs/wholesale.error.log;

    # ---------- 前端静态文件 ----------
    root /www/wwwroot/wholesale;
    index index.html;

    # Vue Router history 模式 - 所有前端路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API 反向代理到 FastAPI ----------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
        proxy_buffering off;
    }

    # ---------- 上传的图片 ----------
    location /uploads/ {
        alias /opt/wholesale/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- 前端静态资源缓存 ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------- 安全配置 ----------
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options nosniff;
    # 防止页面被嵌入 iframe (点击劫持)
    add_header X-Frame-Options SAMEORIGIN;
    # XSS 防护
    add_header X-XSS-Protection "1; mode=block";

    # ---------- 上传大小限制 ----------
    client_max_body_size 20M;

    # ---------- Gzip 压缩(宝塔通常已在全局开启) ----------
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    # ---------- 禁止访问隐藏文件和敏感文件 ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(db|sqlite|env|pyc)$ {
        deny all;
    }

    # ---------- favicon 静默处理 ----------
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}

